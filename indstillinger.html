<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Indstillinger</title>

    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Poppins:wght@600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
            background: #e8f6ff;
        }

        /* --- TOPBJÆLKE (SAMME SOM DE ANDRE SIDER) --- */
        .topbar {
            width: 100%;
            padding: 22px 60px;
            position: fixed;
            top: 0;
            left: 0;

            z-index: 999999999999999999;

            background: linear-gradient(
                135deg,
                rgba(0, 55, 95, 0.65),
                rgba(0, 110, 150, 0.55),
                rgba(0, 160, 210, 0.45)
            );
            backdrop-filter: blur(26px) saturate(220%);
            -webkit-backdrop-filter: blur(26px) saturate(220%);

            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 40px;

            border-bottom: 1px solid rgba(255,255,255,0.55);
            box-shadow:
                0 12px 40px rgba(0,0,0,0.35),
                inset 0 1px 0 rgba(255,255,255,0.95),
                inset 0 -3px 12px rgba(255,255,255,0.25);
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropbtn {
            background: linear-gradient(
                135deg,
                rgba(255,255,255,0.40),
                rgba(210,240,255,0.30)
            );
            color: white;
            padding: 14px 36px;
            border: none;
            cursor: pointer;
            font-size: 18px;
            border-radius: 14px;
            backdrop-filter: blur(12px);
            transition: 0.25s ease;
            letter-spacing: 0.7px;
            font-weight: 600;
            box-shadow:
                0 5px 16px rgba(0,0,0,0.25),
                inset 0 1px 0 rgba(255,255,255,0.7);
        }

        .dropbtn:hover {
            background: rgba(255,255,255,0.6);
            transform: translateY(-2px);
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;

            background: linear-gradient(
                135deg,
                rgba(0, 55, 95, 0.65),
                rgba(0, 110, 150, 0.55),
                rgba(0, 160, 210, 0.45)
            );
            backdrop-filter: blur(22px) saturate(220%);
            min-width: 240px;

            border-radius: 14px;
            overflow: hidden;

            box-shadow:
                0 14px 40px rgba(0,0,0,0.35),
                inset 0 1px 0 rgba(255,255,255,0.8),
                inset 0 -2px 10px rgba(255,255,255,0.25);

            border: 1px solid rgba(255,255,255,0.55);
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown-content a {
            color: white;
            padding: 16px 22px;
            text-decoration: none;
            display: block;
            font-size: 17px;
            transition: 0.2s ease;
        }

        .dropdown-content a:hover {
            background: rgba(255,255,255,0.18);
        }

        /* --- INDSTILLINGER LAYOUT --- */
        .settings-container {
            padding: 160px 60px 80px;
            max-width: 900px;
            margin: auto;
        }

        .settings-title {
            font-size: 48px;
            font-family: "Cormorant Garamond", serif;
            color: #003344;
            margin-bottom: 40px;
        }

        .setting-box {
            background: white;
            padding: 30px;
            border-radius: 14px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }

        .setting-box h2 {
            margin-top: 0;
            font-size: 28px;
            color: #003344;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #d9e9f2;
        }

        .setting-row:last-child {
            border-bottom: none;
        }

        .setting-row label {
            font-size: 20px;
            color: #003344;
        }

        /* Toggle-knapper */
        .toggle {
            position: relative;
            width: 60px;
            height: 30px;
        }

        .toggle input {
            display: none;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            background: #b3cfe0;
            border-radius: 30px;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            transition: 0.3s;
        }

        .slider:before {
            content: "";
            position: absolute;
            height: 24px;
            width: 24px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        input:checked + .slider {
            background: #0094c6;
        }

        input:checked + .slider:before {
            transform: translateX(30px);
        }

        /* FOOTER */
        .footer {
            width: 100%;
            background: #003344;
            color: white;
            padding: 40px 60px;
            text-align: left;
            font-size: 18px;
            line-height: 1.6;
            margin-top: 60px;
        }
    </style>
</head>

            <div class="setting-row">

                <label class="toggle">

            </div>

            <div class="setting-row">

                <label class="toggle">
